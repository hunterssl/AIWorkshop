<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>玄机灵界AI智能体创作平台应用中心</title>
  <link rel="stylesheet" href="/rh/portal/static/css/portal.css" />
  <link rel="stylesheet" href="/rh/studio/studio-user-badge.css" />
  <link rel="stylesheet" href="/rh/studio/studio-theme.css" />
  <script src="/rh/studio/studio-theme.js"></script>
  <script src="/rh/studio/studio-auth-bridge.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left" aria-hidden="true"></div>
    <div class="topbar-center">
      <div class="brand">ComfyUI 应用中心</div>
    </div>
    <div class="top-actions">
      <button type="button" class="rh-theme-toggle" data-rh-theme-toggle aria-label="切换到暗色模式" title="暗色模式"></button>
      <button id="goStudioBtn" class="icon-btn" type="button" title="回到主界面" aria-label="回到主界面">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M12 3 3 10.5V20a1 1 0 0 0 1 1h6v-6h4v6h6a1 1 0 0 0 1-1v-9.5L12 3zm8 16h-4v-6H8v6H4v-8.3l8-6.4 8 6.4V19z"/>
        </svg>
      </button>
      <div class="rh-user-badge" id="portalAuthMenu">
        <button id="portalLoginBtn" class="rh-user-badge__btn" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="portalAuthDropdown">
          <svg class="rh-user-badge__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
          <span id="portalLoginLabel">登录</span>
        </button>
        <div class="rh-user-badge__dropdown is-hidden" id="portalAuthDropdown" role="menu" aria-label="账号菜单">
          <button type="button" class="rh-user-badge__dropdown-item" id="portalLogoutBtn" role="menuitem">退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <div class="modal hidden" id="portalLoginModal" role="dialog" aria-modal="true" aria-labelledby="portalLoginTitle">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="portalLoginTitle">用户登录</h3>
        <button id="portalLoginClose" class="ghost" type="button">关闭</button>
      </div>
      <p class="tip">登录后只能看到自己的历史记录与产出。每个浏览器标签页需单独登录。</p>
      <form id="portalLoginForm" autocomplete="on" novalidate>
        <label class="tip" for="portalLoginUsername">用户名</label>
        <input id="portalLoginUsername" name="username" type="text" maxlength="32" autocomplete="username" placeholder="请输入用户名" />
        <label class="tip" for="portalLoginPassword">密码</label>
        <input id="portalLoginPassword" name="password" type="password" maxlength="64" autocomplete="current-password" placeholder="请输入密码" />
        <div class="modal-actions">
          <button id="portalLoginConfirm" type="button">确认登录</button>
        </div>
      </form>
      <hr style="border:none;border-top:1px solid var(--line);margin:14px 0;" />
      <form id="portalRegisterForm" autocomplete="off" novalidate>
        <label class="tip" for="portalRegisterName">注册新用户</label>
        <input id="portalRegisterName" name="portal-register-name" type="text" maxlength="32" autocomplete="off" placeholder="例如：张三" />
        <label class="tip" for="portalRegisterPassword">设置密码</label>
        <input id="portalRegisterPassword" name="portal-register-password" type="password" maxlength="64" autocomplete="new-password" placeholder="至少 6 位" />
        <label class="tip" for="portalRegisterConfirmPassword">确认密码</label>
        <input id="portalRegisterConfirmPassword" name="portal-register-password-confirm" type="password" maxlength="64" autocomplete="new-password" placeholder="再次输入密码" />
        <div class="modal-actions">
          <button id="portalRegisterConfirm" type="button" class="ghost">注册并登录</button>
        </div>
      </form>
    </div>
  </div>

  <main id="appRoot" class="page"></main>

  <script src="/rh/portal/static/js/portal.js"></script>
</body>
</html>
