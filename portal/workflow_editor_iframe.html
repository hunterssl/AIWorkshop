<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作流编辑器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #e2e8f0;
      background: #12161f;
      height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      background: linear-gradient(130deg, rgba(17, 24, 39, 0.96), rgba(15, 23, 42, 0.96));
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.42);
    }
    .title-block {
      min-width: 0;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      display: none;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    button {
      border: 1px solid transparent;
      border-radius: 999px;
      color: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 12px;
      cursor: pointer;
      transition: transform .15s ease, filter .18s ease, box-shadow .18s ease;
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.34);
    }
    #btnBack {
      background: linear-gradient(135deg, #334155, #475569);
    }
    #btnRun {
      background: linear-gradient(135deg, #15803d, #22c55e);
    }
    #btnSave {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
    }
    #btnRun:disabled,
    #btnSave:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }
    #btnRetry {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
    }
    #btnReloadFrame {
      background: linear-gradient(135deg, #ea580c, #f97316);
    }
    .main {
      position: relative;
      min-height: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b1020;
      opacity: 0;
      transition: opacity .18s ease;
    }
    iframe.ready { opacity: 1; }
    .status {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 8;
      min-width: 260px;
      max-width: min(460px, calc(100vw - 24px));
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.84);
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease;
    }
    .status.show { opacity: 1; }
    .status.ok { border-color: rgba(34, 197, 94, 0.45); }
    .status.err { border-color: rgba(239, 68, 68, 0.45); color: #fecaca; }
    .loading-mask {
      position: absolute;
      inset: 0;
      z-index: 7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px;
      text-align: center;
      background: radial-gradient(circle at center, rgba(30, 41, 59, .45), rgba(11, 16, 32, .96));
      font-size: 13px;
      color: #cbd5e1;
      letter-spacing: .2px;
      white-space: pre-line;
      line-height: 1.6;
      transition: opacity .18s ease;
    }
    .loading-mask.offline {
      color: #fecaca;
    }
    .loading-mask.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <script src="/rh/studio/studio-auth-bridge.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="title-block">
      <div class="title" id="title">工作流编辑器</div>
      <div class="meta" id="meta">准备中...</div>
    </div>
    <div class="actions">
      <button id="btnBack" type="button">返回创作工坊</button>
      <button id="btnRun" type="button" disabled>运行</button>
      <button id="btnSave" type="button" disabled>保存</button>
      <button id="btnRetry" type="button">重试导入</button>
      <button id="btnReloadFrame" type="button">重载画布</button>
    </div>
  </header>
  <main class="main">
    <iframe id="comfyFrame" allow="clipboard-read; clipboard-write"></iframe>
    <div class="loading-mask" id="loadingMask">正在准备编辑器并导入工作流，请稍候...</div>
    <div class="status" id="status">等待画布启动...</div>
  </main>

  <script>
    (function () {
      const frame = document.getElementById("comfyFrame");
      const loadingMask = document.getElementById("loadingMask");
      const statusEl = document.getElementById("status");
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const btnRetry = document.getElementById("btnRetry");
      const btnReloadFrame = document.getElementById("btnReloadFrame");
      const btnBack = document.getElementById("btnBack");
      const btnRun = document.getElementById("btnRun");
      const btnSave = document.getElementById("btnSave");

      const ORIGIN = window.location.origin;
      const COMFY_OFFLINE_MSG =
        "ComfyUI 算力节点未启动或无法连接\n\n请先运行：\nAIWorkshop\\deploy\\scripts\\start-comfyui-lan.bat\n\n启动后点击「重载画布」重试。";
      const state = {
        appId: "",
        appName: "",
        workflow: null,
        iframeReady: false,
        loading: false,
        sendCount: 0,
        imported: false,
        importRetryTimer: null,
        importRetryCount: 0,
        importRetryMax: 40,
        iframeReadyTimer: null,
        actionBusy: false,
        pendingAction: "",
      };

      function authHeaders(extra = {}) {
        const auth = readStudioAuthPayload();
        const headers = { ...extra };
        if (auth.user_id) headers["Comfy-User"] = auth.user_id;
        if (auth.session_token && auth.authed_user_id && auth.authed_user_id === auth.user_id) {
          headers["rh-studio-session"] = auth.session_token;
        }
        return headers;
      }

      function setActionButtonsEnabled(enabled) {
        btnRun.disabled = !enabled || state.actionBusy;
        btnSave.disabled = !enabled || state.actionBusy;
      }

      function setActionBusy(busy, label) {
        state.actionBusy = busy;
        setActionButtonsEnabled(state.imported);
        if (busy && label) {
          setStatus(label, "");
          statusEl.classList.add("show");
        }
      }

      function postToIframe(type, payload = {}) {
        if (!frame.contentWindow || !state.iframeReady) {
          throw new Error("画布未就绪");
        }
        frame.contentWindow.postMessage({ type, payload }, ORIGIN);
      }

      function setStatus(text, mode) {
        statusEl.textContent = text;
        statusEl.className = `status ${mode || ""}`.trim();
        if (text && mode === "err") statusEl.classList.add("show");
        else if (text && !state.imported) statusEl.classList.add("show");
        else statusEl.classList.remove("show");
        if (text && !state.imported) {
          loadingMask.textContent = text.replace(/\n/g, "\n");
          loadingMask.classList.toggle("offline", mode === "err");
        } else if (!state.imported) {
          loadingMask.textContent = "正在准备编辑器并导入工作流，请稍候...";
          loadingMask.classList.remove("offline");
        }
      }

      function showComfyOffline() {
        setEditorVisible(false);
        if (state.iframeReadyTimer) {
          clearTimeout(state.iframeReadyTimer);
          state.iframeReadyTimer = null;
        }
        clearImportRetryTimer();
        setStatus(COMFY_OFFLINE_MSG, "err");
      }

      async function checkComfyWorkerOnline() {
        try {
          const resp = await fetch("/rh/api/comfy/status", { cache: "no-store" });
          const data = await resp.json().catch(() => ({}));
          return Boolean(resp.ok && data.online);
        } catch {
          return false;
        }
      }

      function setEditorVisible(visible) {
        if (visible) {
          frame.classList.add("ready");
          loadingMask.classList.add("hidden");
          setStatus("", "");
          setActionButtonsEnabled(true);
          return;
        }
        frame.classList.remove("ready");
        loadingMask.classList.remove("hidden");
        setActionButtonsEnabled(false);
      }

      function startIframeReadyWatchdog() {
        if (state.iframeReadyTimer) clearTimeout(state.iframeReadyTimer);
        state.iframeReadyTimer = setTimeout(async () => {
          if (state.iframeReady || state.imported) return;
          const online = await checkComfyWorkerOnline();
          if (!online) {
            showComfyOffline();
            return;
          }
          setEditorVisible(false);
          setStatus(
            "画布启动超时（60秒）\n请点击「重载画布」后重试，或确认 ComfyUI 已重启",
            "err"
          );
        }, 60000);
      }

      function readStudioAuthPayload() {
        try {
          const userId = localStorage.getItem("rh_studio_user_id") || "";
          const displayName = localStorage.getItem("Comfy.userName") || userId.split("_")[0] || userId;
          return {
            user_id: userId,
            display_name: displayName,
            session_token: sessionStorage.getItem("rh_studio_session_token") || "",
            authed_user_id: sessionStorage.getItem("rh_studio_authed_user_id") || "",
          };
        } catch {
          return { user_id: "", display_name: "", session_token: "", authed_user_id: "" };
        }
      }

      function primeComfyUserBeforeIframe() {
        const auth = readStudioAuthPayload();
        if (!auth.user_id) return false;
        try {
          localStorage.setItem("Comfy.userId", auth.user_id);
          localStorage.setItem("Comfy.userName", auth.display_name || auth.user_id);
          document.cookie = `rh_studio_user_id=${encodeURIComponent(auth.user_id)}; path=/; SameSite=Lax`;
        } catch (_) {}
        return true;
      }

      function mountComfyIframe() {
        if (!frame) return;
        frame.src = "/?rh_iframe_editor=1";
      }

      function postAuthToIframe() {
        if (!frame.contentWindow || !state.iframeReady) return;
        const auth = readStudioAuthPayload();
        if (!auth.user_id) return;
        frame.contentWindow.postMessage(
          { type: "RH_STUDIO_AUTH", payload: auth },
          ORIGIN
        );
      }

      function clearImportRetryTimer() {
        if (state.importRetryTimer) {
          clearInterval(state.importRetryTimer);
          state.importRetryTimer = null;
        }
      }

      function canPostImport() {
        return Boolean(state.workflow && state.iframeReady && frame.contentWindow);
      }

      function startImportRetryLoop() {
        clearImportRetryTimer();
        state.importRetryTimer = setInterval(() => {
          if (state.imported) {
            clearImportRetryTimer();
            return;
          }
          if (!canPostImport()) return;
          state.importRetryCount += 1;
          if (state.importRetryCount > state.importRetryMax) {
            clearImportRetryTimer();
            setEditorVisible(false);
            setStatus("导入超时，请点击「重试导入」或「重载画布」", "err");
            return;
          }
          postImport("auto-retry");
        }, 1200);
      }

      function flushImport(reason = "flush") {
        if (state.imported) return;
        if (!state.workflow) {
          setStatus("正在拉取工作流...");
          return;
        }
        if (!state.iframeReady) {
          setStatus("工作流已加载，等待画布 READY...");
          return;
        }
        postImport(reason);
        if (!state.importRetryTimer) startImportRetryLoop();
      }

      function getAppIdFromPath() {
        const m = window.location.pathname.match(/\/rh\/editor\/([^/?#]+)/);
        return m ? decodeURIComponent(m[1]) : "";
      }

      async function requestJson(url, options = {}) {
        const method = String(options.method || "GET").toUpperCase();
        const headers = authHeaders(options.headers || {});
        if (method !== "GET" && method !== "HEAD" && !headers["Content-Type"]) {
          headers["Content-Type"] = "application/json";
        }
        const resp = await fetch(url, {
          ...options,
          headers,
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data?.error || `HTTP ${resp.status}`);
        return data;
      }

      async function requestText(url, options = {}) {
        const resp = await fetch(url, {
          ...options,
          headers: authHeaders(options.headers || {}),
        });
        const text = await resp.text();
        if (!resp.ok) {
          try {
            const data = JSON.parse(text || "{}");
            throw new Error(data?.error || `HTTP ${resp.status}`);
          } catch {
            throw new Error(`HTTP ${resp.status}`);
          }
        }
        return text;
      }

      async function loadWorkflow() {
        if (!state.appId) throw new Error("缺少 app_id");
        setStatus("正在拉取应用与工作流...");
        const [detail, raw] = await Promise.all([
          requestJson(`/rh/api/apps/${encodeURIComponent(state.appId)}?lite=1`),
          requestText(`/rh/api/apps/${encodeURIComponent(state.appId)}/workflow-file`),
        ]);
        let workflow = null;
        try {
          workflow = JSON.parse(raw);
        } catch {
          throw new Error("服务器 workflow-file 不是有效 JSON");
        }
        if (!workflow || !Array.isArray(workflow.nodes) || workflow.nodes.length === 0) {
          throw new Error("workflow_json 为空或无节点");
        }
        state.appName = String(detail?.name || state.appId);
        state.workflow = workflow;
        titleEl.textContent = state.appName;
        document.title = `${state.appName} · 工作流编辑器`;
        metaEl.textContent = "";
      }

      function postImport(reason) {
        if (!state.workflow) {
          setStatus("正在拉取工作流...");
          return;
        }
        if (!state.iframeReady) {
          setStatus("等待画布 READY...");
          return;
        }
        if (!frame.contentWindow) {
          setStatus("iframe 未就绪，无法发送导入命令", "err");
          return;
        }
        state.sendCount += 1;
        setStatus(`正在导入工作流（${reason}）...\n第 ${state.sendCount} 次发送`);
        frame.contentWindow.postMessage(
          {
            type: "RH_IMPORT_WORKFLOW",
            payload: {
              app_id: state.appId,
              app_name: state.appName,
              workflow: state.workflow,
            },
          },
          ORIGIN
        );
      }

      async function saveWorkflowToUser(workflow) {
        const result = await requestJson(
          `/rh/api/apps/${encodeURIComponent(state.appId)}/workflow-file`,
          {
            method: "PUT",
            body: JSON.stringify({ workflow_json: workflow }),
          }
        );
        state.workflow = workflow;
        return result;
      }

      function runWorkflow() {
        if (!state.imported || state.actionBusy) return;
        try {
          setActionBusy(true, "正在提交运行...");
          state.pendingAction = "run";
          postToIframe("RH_RUN_WORKFLOW");
        } catch (error) {
          state.pendingAction = "";
          setActionBusy(false);
          setStatus(`运行失败\n${error.message}`, "err");
        }
      }

      function saveWorkflow() {
        if (!state.imported || state.actionBusy) return;
        try {
          setActionBusy(true, "正在读取画布并保存...");
          state.pendingAction = "save";
          postToIframe("RH_EXPORT_WORKFLOW");
        } catch (error) {
          state.pendingAction = "";
          setActionBusy(false);
          setStatus(`保存失败\n${error.message}`, "err");
        }
      }

      function wireEvents() {
        window.addEventListener("message", (event) => {
          if (event.origin !== ORIGIN) return;
          const data = event.data || {};
          if (!data || typeof data !== "object") return;
          if (data.type === "RH_IFRAME_READY") {
            state.iframeReady = true;
            if (state.iframeReadyTimer) {
              clearTimeout(state.iframeReadyTimer);
              state.iframeReadyTimer = null;
            }
            setStatus("画布已就绪，正在导入工作流...");
            postAuthToIframe();
            flushImport("iframe-ready");
            return;
          }
          if (data.type === "RH_IFRAME_IMPORTED") {
            const nodes = Number(data?.payload?.nodes || 0);
            if (nodes > 0) {
              state.imported = true;
              clearImportRetryTimer();
              setEditorVisible(true);
              setStatus("", "");
            } else {
              setStatus("导入完成但节点数为 0，正在重试...", "err");
              flushImport("empty-nodes-retry");
            }
            return;
          }
          if (data.type === "RH_IFRAME_ERROR") {
            const msg = String(data?.payload?.message || "unknown error");
            setStatus(`导入失败\n${msg}`, "err");
            if (!state.importRetryTimer) startImportRetryLoop();
            return;
          }
          if (data.type === "RH_RUN_OK") {
            state.pendingAction = "";
            setActionBusy(false);
            const promptId = String(data?.payload?.prompt_id || "").trim();
            setStatus(promptId ? `已提交运行\n任务 ID: ${promptId}` : "已提交运行", "ok");
            statusEl.classList.add("show");
            window.setTimeout(() => {
              if (!state.actionBusy) setStatus("", "");
            }, 2800);
            return;
          }
          if (data.type === "RH_RUN_ERROR") {
            state.pendingAction = "";
            setActionBusy(false);
            setStatus(`运行失败\n${String(data?.payload?.message || "unknown error")}`, "err");
            return;
          }
          if (data.type === "RH_WORKFLOW_EXPORTED") {
            if (state.pendingAction !== "save") return;
            const workflow = data?.payload?.workflow;
            saveWorkflowToUser(workflow)
              .then((result) => {
                state.pendingAction = "";
                setActionBusy(false);
                const nodes = Number(result?.node_count || data?.payload?.nodes || 0);
                setStatus(`保存成功\n已写入你的账号（${nodes} 个节点）`, "ok");
                statusEl.classList.add("show");
                window.setTimeout(() => {
                  if (!state.actionBusy) setStatus("", "");
                }, 2800);
              })
              .catch((error) => {
                state.pendingAction = "";
                setActionBusy(false);
                setStatus(`保存失败\n${error.message}`, "err");
              });
            return;
          }
          if (data.type === "RH_EXPORT_ERROR") {
            state.pendingAction = "";
            setActionBusy(false);
            setStatus(`保存失败\n${String(data?.payload?.message || "unknown error")}`, "err");
          }
        });

        btnRun.addEventListener("click", runWorkflow);
        btnSave.addEventListener("click", saveWorkflow);

        btnRetry.addEventListener("click", () => {
          state.importRetryCount = 0;
          state.imported = false;
          setEditorVisible(false);
          setStatus("正在重新导入工作流...");
          flushImport("manual-retry");
          startImportRetryLoop();
        });
        btnReloadFrame.addEventListener("click", async () => {
          setStatus("正在检查 ComfyUI 算力节点...");
          const online = await checkComfyWorkerOnline();
          if (!online) {
            showComfyOffline();
            return;
          }
          state.iframeReady = false;
          state.imported = false;
          state.importRetryCount = 0;
          clearImportRetryTimer();
          if (state.iframeReadyTimer) {
            clearTimeout(state.iframeReadyTimer);
            state.iframeReadyTimer = null;
          }
          setEditorVisible(false);
          setStatus("正在重载 iframe...");
          primeComfyUserBeforeIframe();
          frame.src = "/?rh_iframe_editor=1";
          startIframeReadyWatchdog();
        });
        btnBack.addEventListener("click", () => {
          window.location.href = "/rh/studio";
        });
      }

      async function bootstrap() {
        state.appId = getAppIdFromPath();
        if (!state.appId) throw new Error("URL 缺少 app_id");
        setEditorVisible(false);
        wireEvents();
        if (!primeComfyUserBeforeIframe()) {
          setStatus("请先在创作工坊登录，再编辑工作流", "err");
          return;
        }
        setStatus("正在检查 ComfyUI 算力节点...");
        const comfyOnline = await checkComfyWorkerOnline();
        if (!comfyOnline) {
          showComfyOffline();
          return;
        }
        mountComfyIframe();
        startIframeReadyWatchdog();
        await loadWorkflow();
        flushImport("workflow-loaded");
      }

      bootstrap().catch((error) => {
        setStatus(`初始化失败\n${error.message}`, "err");
      });
    })();
  </script>
</body>
</html>
