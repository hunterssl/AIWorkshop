# 灵影平台 — 内网部署（无域名、无 HTTPS）
# 适用：公司/家庭局域网，其他电脑通过 http://服务器IP 访问
#
# 安装: 复制到 /etc/nginx/sites-available/ 并启用（Linux）
# 或 Windows: 用 deploy/scripts/start-comfyui-lan.bat 更简单，可不装 Nginx

upstream comfyui_lan {
    server 127.0.0.1:8188;
}

server {
    listen 80;
    # 只监听内网时可写具体 IP，例如: listen 192.168.1.100:80;
    server_name _;

    client_max_body_size 100m;

    # 内网多人共用时可开启（可选）
    # auth_basic "Lingying";
    # auth_basic_user_file /etc/nginx/lingying.htpasswd;

    location = / {
        return 302 /rh/studio;
    }

    location /ws {
        proxy_pass http://comfyui_lan;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /rh/ws/ {
        proxy_pass http://comfyui_lan;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://comfyui_lan;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600;
    }
}
