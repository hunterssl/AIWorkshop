# 灵影平台 — Nginx 对外部署配置
# 用法见下方注释。部署前请替换 YOUR_DOMAIN 并配置 HTTPS。

# ---------- 限流（防刷图） ----------
limit_req_zone $binary_remote_addr zone=rh_run:10m rate=30r/m;

upstream comfyui_backend {
    server 127.0.0.1:8188;
    keepalive 32;
}

# HTTP → HTTPS 跳转（证书就绪后启用）
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 100m;

    # 全站登录保护（对外部署必开，见 deploy/scripts/gen-auth.sh）
    auth_basic "Lingying Platform";
    auth_basic_user_file /etc/nginx/lingying.htpasswd;

    # 首页 → 创作工坊
    location = / {
        return 302 /rh/studio;
    }

    # ComfyUI WebSocket（节点界面、队列进度）
    location /ws {
        proxy_pass http://comfyui_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 画布 WebSocket
    location /rh/ws/ {
        proxy_pass http://comfyui_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # 跑图 API 单独限流
    location = /rh/api/studio/run-local {
        limit_req zone=rh_run burst=5 nodelay;
        proxy_pass http://comfyui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }

    # 其余全部转发给 ComfyUI（含 /rh/studio /rh/canvas2 /comfy /rh/api /extensions）
    location / {
        proxy_pass http://comfyui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }
}
