# 灵影拆分架构：Nginx 统一入口（可选）
# 用户访问 http://服务器IP/  → 工坊网关 8080
# ComfyUI 原生界面 /comfyui/ → 8188（仅管理员）
#
# 使用前请修改 server_name 与 upstream 地址。

upstream lingying_gateway {
    server 127.0.0.1:8080;
}

upstream comfy_worker {
    server 127.0.0.1:8188;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # 工坊 UI + 登录 + 封面 + API 代理（推荐主入口）
    location / {
        proxy_pass http://lingying_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /ws {
        proxy_pass http://lingying_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ComfyUI 原生界面（可选，给管理员调试）
    location /comfyui/ {
        proxy_pass http://comfy_worker/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
